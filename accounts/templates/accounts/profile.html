<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile</title>
  </head>
  <body>
    <h2>Hello, {{ user.first_name }} {{ user.last_name }}</h2>

    <div class="card shadow-sm">
      <div class="card-body">
        <table class="table table-striped text-center align-middle">
          <thead>
            <tr>
              <th>Name</th>
              <th>Category</th>
              <th>Release Date</th>
            </tr>
          </thead>
          <tbody>
            {% for game in user.games.all %}
              <tr>
                <td>
                  <a href="{% url 'games:details' game.pk %}">{{ game.name }}</a>
                </td>
                <td>{{ game.category }}</td>
                <td>{{ game.release_date }}</td>
              </tr>
            {% empty %}
              <tr>
                <td colspan="3">No games yet.</td>
              </tr>
            {% endfor %}
          </tbody>
        </table>
      </div>
    </div>
  </body>
</html>
