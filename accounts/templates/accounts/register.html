<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Auth System</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet" />
    <style>
      :root {
        --primary: #6366f1;
        --primary-hover: #4f46e5;
        --bg: #0f172a;
        --card-bg: #1e293b;
        --text-main: #f8fafc;
        --text-muted: #94a3b8;
        --error: #ef4444;
        --success: #22c55e;
      }
      
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Outfit', sans-serif;
      }
      
      body {
        background-color: #fff;
        color: var(--text-main);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }
      
      .container {
        width: 100%;
        max-width: 1200px;
        padding: 2rem;
      }
      
      .card {
        background-color: #fff;
        border-radius: 1.5rem;
        padding: 2.5rem;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        border: 1px solid rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(10px);
      }
      
      input {
        color: #000;
      }
      
      h1 {
        font-size: 2rem;
        font-weight: 600;
        margin-bottom: 0.5rem;
        text-align: center;
        background: linear-gradient(to right, #818cf8, #c084fc);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      
      .subtitle {
        color: var(--text-muted);
        text-align: center;
        margin-bottom: 2rem;
        font-size: 0.95rem;
      }
      
      .form-group {
        margin-bottom: 1.5rem;
      }
      
      .form-control {
        width: 100%;
        padding: 0.8rem 1rem;
        background: #e1eaff80;
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 0.75rem;
        color: #000;
        transition: all 0.3s ease;
      }
      
      .form-control:focus {
        outline: none;
        border-color: var(--primary);
        box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2);
      }
      
      .btn {
        width: 100%;
        padding: 0.8rem;
        background: var(--primary);
        color: white;
        border: none;
        border-radius: 0.75rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        margin-top: 1rem;
      }
      
      .btn:hover {
        background: var(--primary-hover);
        transform: translateY(-1px);
      }
      
      .messages {
        list-style: none;
        margin-bottom: 1.5rem;
      }
      
      .message {
        padding: 0.75rem 1rem;
        border-radius: 0.75rem;
        margin-bottom: 0.5rem;
        font-size: 0.9rem;
      }
      
      .message.success {
        background: rgba(34, 197, 94, 0.2);
        color: var(--success);
        border: 1px solid rgba(34, 197, 94, 0.2);
      }
      
      .message.error {
        background: rgba(239, 68, 68, 0.2);
        color: var(--error);
        border: 1px solid rgba(239, 68, 68, 0.2);
      }
      
      .footer-text {
        text-align: center;
        margin-top: 1.5rem;
        color: var(--text-muted);
        font-size: 0.9rem;
      }
      
      .footer-text a {
        color: var(--primary);
        text-decoration: none;
        font-weight: 600;
      }
      
      .footer-text a:hover {
        text-decoration: underline;
      }
      
      .errorlist {
        color: var(--error);
        font-size: 0.8rem;
        margin-top: 0.25rem;
        list-style: none;
      }
    </style>
  </head>
  <body>
    <div class="container">
      {% if messages %}
        <ul class="messages">
          {% for message in messages %}
            <li class="message {{ message.tags }}">{{ message }}</li>
          {% endfor %}
        </ul>
      {% endif %}

      <div class="card">
        {% block content %}
          <div class="container">
            <div class="registration-form">
              <h1>Create Account</h1>
              <form method="POST" action="/register">
                {% csrf_token %}

                <div class="form-group">
                  <input type="text" class="form-control" name="first_name" placeholder="First Name" />
                </div>
                <div class="form-group">
                  <input type="text" class="form-control" name="last_name" placeholder="Last Name" />
                </div>
                <div class="form-group">
                  <input type="email" class="form-control" name="email" placeholder="Email" />
                </div>
                <div class="form-group">
                  <input type="date" class="form-control" name="birthday" placeholder="Birthday" />
                </div>
                <div class="form-group">
                  <input type="password" class="form-control" name="password" placeholder="Password" />
                </div>
                <div class="form-group">
                  <input type="password" class="form-control" name="confirm_password" placeholder="Confirm Password" />
                </div>

                <button type="submit" class="btn">Sign Up</button>
              </form>
              <a href="{% url 'login' %}">Login</a>
            </div>
          </div>
        {% endblock %}
      </div>
    </div>

    <script>
      const registration_form = document.querySelector('.registration_form form')
      const login_form = document.querySelector('.login-form form')
      registration_form.addEventListener('submit', function (e) {
        login_form.setAttribute('submit', false)
      })
    </script>
  </body>
</html>
